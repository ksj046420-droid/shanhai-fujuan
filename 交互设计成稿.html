<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>山海浮卷 · 全界面动画 + 3D模型交互版</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root{
    --gold:#e8bd73;--gold2:#ffdd92;--deep:#051018;--panel:rgba(6,17,25,.82);--cyan:#7ed8ff;--ink:#0a1420;--paper:#dbc089;--red:#ba4b2b;
    --stage-w:min(100vw, calc(100vh * 1672 / 941));--stage-h:calc(var(--stage-w) * 941 / 1672);
  }
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#02070c;color:#f7e8c6;font-family:"Microsoft YaHei","PingFang SC",system-ui,-apple-system,Segoe UI,sans-serif;}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 48%,rgba(240,177,72,.15),transparent 32%),linear-gradient(180deg,#02050b,#07131b 48%,#02050b);pointer-events:none;}
  #app{position:fixed;inset:0;display:grid;place-items:center;}
  .stage{position:relative;width:var(--stage-w);height:var(--stage-h);max-width:100vw;max-height:100vh;overflow:hidden;background:#051018;box-shadow:0 0 55px rgba(237,184,91,.16),0 0 0 1px rgba(232,189,115,.32) inset;isolation:isolate;}
  .page-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;user-select:none;-webkit-user-drag:none;filter:saturate(1.04) contrast(1.02);}
  .dim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.01),rgba(0,0,0,.08));pointer-events:none;}
  .hotspot{position:absolute;border:1px solid transparent;border-radius:12px;cursor:pointer;z-index:5;transition:.18s ease;background:transparent;padding:0;}
  .hotspot:hover,.hotspot.focus{border-color:rgba(255,219,145,.74);box-shadow:0 0 0 1px rgba(255,219,145,.18) inset,0 0 24px rgba(232,189,115,.38);background:rgba(255,204,102,.06);}
  .hotspot.node{border-radius:50%;}
  .hotspot.panel{border-radius:18px;}
  .show-hotspots .hotspot{border-color:rgba(255,219,145,.46);background:rgba(255,204,102,.06);}
  .hot-label{position:absolute;left:8px;top:-25px;padding:2px 8px;border:1px solid rgba(232,189,115,.45);background:rgba(3,12,18,.82);color:#ffe0a0;font-size:12px;border-radius:12px;opacity:0;white-space:nowrap;pointer-events:none;text-shadow:0 1px 3px #000;}
  .show-hotspots .hot-label,.hotspot:hover .hot-label{opacity:1;}
  .ui-breadcrumb{position:absolute;left:15.9%;top:8.8%;z-index:8;padding:5px 12px;border:1px solid rgba(232,189,115,.35);background:rgba(0,0,0,.34);border-radius:999px;color:#f8d699;font-size:12px;letter-spacing:.1em;backdrop-filter:blur(8px);pointer-events:none;}
  .page-counter{position:absolute;right:1.6%;top:8.6%;z-index:8;padding:5px 11px;border:1px solid rgba(232,189,115,.35);background:rgba(0,0,0,.34);border-radius:999px;color:#c9d9df;font-size:12px;backdrop-filter:blur(8px);pointer-events:none;}
  .devbar{position:absolute;right:1.1%;bottom:1.15%;z-index:18;display:flex;gap:6px;align-items:center;opacity:.34;transition:.2s ease;}
  .devbar:hover{opacity:1;}
  .mini-btn{height:26px;padding:0 9px;border:1px solid rgba(232,189,115,.38);background:rgba(4,13,19,.68);color:#f6dcab;border-radius:999px;font-size:12px;letter-spacing:.04em;cursor:pointer;backdrop-filter:blur(8px);}
  .mini-btn:hover{background:rgba(232,189,115,.16);color:#fff0c4;}
  .quick-nav{position:absolute;left:50%;bottom:1.15%;z-index:16;transform:translateX(-50%);display:flex;gap:7px;padding:5px 7px;border:1px solid rgba(232,189,115,.25);background:rgba(2,8,12,.58);border-radius:999px;backdrop-filter:blur(8px);}
  .quick-nav button{height:26px;border:1px solid rgba(232,189,115,.30);background:rgba(232,189,115,.06);color:#d8c298;border-radius:999px;padding:0 10px;cursor:pointer;font-size:12px;}
  .quick-nav button:hover,.quick-nav button.active{background:rgba(232,189,115,.18);color:#ffe0a4;}

  /* 启动页 */
  .splash{position:absolute;inset:0;overflow:hidden;background:#02070b;}
  .splash-bg{position:absolute;inset:-3%;background:linear-gradient(rgba(2,7,12,.18),rgba(2,7,12,.74)),url('assets/p00.png') center/cover no-repeat;filter:blur(2px) brightness(.68) saturate(1.15);transform:scale(1.04);}
  .splash::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 47%,rgba(255,208,125,.34),transparent 23%),radial-gradient(circle at 50% 50%,transparent 26%,rgba(0,0,0,.72) 72%);}
  .stars{position:absolute;inset:0;background-image:radial-gradient(rgba(255,226,155,.8) 1px,transparent 1px),radial-gradient(rgba(126,216,255,.45) 1px,transparent 1px);background-size:70px 70px,115px 115px;animation:floatStars 14s linear infinite;opacity:.45;}
  @keyframes floatStars{from{transform:translateY(0)}to{transform:translateY(-70px)}}
  .splash-core{position:absolute;left:50%;top:50%;width:52%;height:52%;transform:translate(-50%,-48%);border-radius:50%;}
  .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,211,128,.34);box-shadow:0 0 35px rgba(246,184,87,.13) inset;animation:spin 16s linear infinite;}
  .ring.r2{inset:10%;border-style:dashed;animation-duration:24s;animation-direction:reverse;opacity:.7}
  .ring.r3{inset:23%;animation-duration:12s;opacity:.55}
  @keyframes spin{to{transform:rotate(360deg)}}
  .splash-title{position:absolute;left:50%;top:20.5%;transform:translateX(-50%);text-align:center;text-shadow:0 0 25px rgba(232,189,115,.3);}
  .splash-title h1{margin:0;font-size:clamp(42px,6.5vw,98px);font-family:Georgia,"STKaiti","KaiTi",serif;letter-spacing:.12em;line-height:1;background:linear-gradient(180deg,#fff3bd,#d89d43 65%,#79511e);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .splash-title p{margin:.8em 0 0;color:#ecd5a5;font-size:clamp(14px,1.3vw,22px);letter-spacing:.35em;}
  .splash-card{position:absolute;left:50%;top:69%;transform:translate(-50%,-50%);width:min(560px,48%);padding:24px 26px 22px;border:1px solid rgba(232,189,115,.42);border-radius:24px;background:linear-gradient(180deg,rgba(8,23,32,.78),rgba(4,12,18,.88));box-shadow:0 14px 50px rgba(0,0,0,.45),0 0 50px rgba(232,189,115,.12) inset;backdrop-filter:blur(12px);text-align:center;}
  .splash-card .seal{display:inline-block;margin-bottom:10px;padding:4px 10px;border:1px solid rgba(232,189,115,.45);border-radius:999px;color:#ffd891;font-size:13px;letter-spacing:.26em;}
  .splash-card p{margin:0 auto 18px;line-height:1.8;color:#cdb68a;font-size:14px;}
  .enter-btn{position:relative;border:0;background:linear-gradient(180deg,#ffe4a8,#c6842b);color:#211407;font-size:18px;font-weight:700;letter-spacing:.12em;border-radius:999px;padding:13px 32px;cursor:pointer;box-shadow:0 0 28px rgba(246,184,87,.35);}
  .enter-btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
  .splash-progress{position:absolute;left:50%;top:88%;width:38%;height:4px;transform:translateX(-50%);background:rgba(232,189,115,.16);border-radius:99px;overflow:hidden;}
  .splash-progress span{display:block;width:72%;height:100%;background:linear-gradient(90deg,transparent,#ffda8a,#fff4c7);animation:scan 2.4s ease-in-out infinite;}
  @keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(140%)}}

  /* 搜索页 */
  .search-page{position:absolute;inset:0;overflow:hidden;background:#07121b;}
  .search-page::before{content:"";position:absolute;inset:-2%;background:linear-gradient(rgba(2,8,13,.84),rgba(2,8,13,.91)),url('assets/p00.png') center/cover no-repeat;filter:blur(1px) saturate(.85);}
  .search-shell{position:absolute;inset:4.8% 5.4%;border:1px solid rgba(232,189,115,.36);border-radius:26px;background:linear-gradient(180deg,rgba(5,18,27,.76),rgba(3,10,15,.88));box-shadow:0 0 0 1px rgba(255,225,158,.06) inset,0 22px 65px rgba(0,0,0,.48);backdrop-filter:blur(14px);display:grid;grid-template-rows:auto auto 1fr;gap:18px;padding:28px;}
  .search-head{display:flex;align-items:center;gap:18px;}
  .back-btn,.ghost-btn,.solid-btn{border:1px solid rgba(232,189,115,.46);background:rgba(232,189,115,.08);color:#f9deaa;border-radius:14px;padding:10px 14px;cursor:pointer;}
  .back-btn:hover,.ghost-btn:hover{background:rgba(232,189,115,.16)}
  .solid-btn{background:linear-gradient(180deg,#f7d18d,#a66c24);color:#180e04;font-weight:700;border:0;}
  .search-title{flex:1}
  .search-title h2{margin:0;font-size:32px;font-family:Georgia,"STKaiti","KaiTi",serif;color:#ffd88d;letter-spacing:.12em;}
  .search-title p{margin:7px 0 0;color:#9fb1b8;font-size:13px;letter-spacing:.08em}
  .search-box{display:flex;align-items:center;gap:12px;border:1px solid rgba(232,189,115,.42);background:rgba(0,0,0,.24);border-radius:18px;padding:12px 16px;box-shadow:0 0 24px rgba(232,189,115,.08) inset;}
  .search-icon{font-size:21px;color:#ffd98d}
  .search-input{flex:1;border:0;outline:0;background:transparent;color:#fff0c9;font-size:18px;letter-spacing:.08em;}
  .search-input::placeholder{color:#8d9ca3}
  .chips{display:flex;gap:10px;flex-wrap:wrap;}
  .chip{border:1px solid rgba(232,189,115,.32);background:rgba(232,189,115,.07);color:#d8c298;padding:8px 14px;border-radius:999px;cursor:pointer;font-size:13px;}
  .chip.active,.chip:hover{background:rgba(232,189,115,.2);color:#ffe4ad;box-shadow:0 0 18px rgba(232,189,115,.12)}
  .search-body{display:grid;grid-template-columns:1fr 330px;gap:20px;min-height:0;}
  .results{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;overflow:auto;padding-right:6px;}
  .results::-webkit-scrollbar{width:7px} .results::-webkit-scrollbar-thumb{background:rgba(232,189,115,.38);border-radius:99px}
  .result-card{position:relative;min-height:185px;border:1px solid rgba(232,189,115,.25);border-radius:18px;overflow:hidden;background:rgba(2,8,12,.62);cursor:pointer;box-shadow:0 10px 25px rgba(0,0,0,.25);}
  .result-card:hover{border-color:rgba(255,219,145,.65);transform:translateY(-2px);transition:.18s ease;}
  .result-card img{width:100%;height:108px;object-fit:cover;display:block;filter:saturate(1.06)}
  .result-meta{padding:10px 12px 12px;}
  .result-meta strong{display:block;color:#ffe0a4;font-size:16px;margin-bottom:5px;}
  .result-meta span{font-size:12px;color:#9fafb9;}
  .result-actions{position:absolute;right:10px;bottom:10px;display:flex;gap:6px;}
  .result-actions button{height:26px;padding:0 9px;border-radius:999px;border:1px solid rgba(232,189,115,.34);background:rgba(0,0,0,.34);color:#f4d59c;cursor:pointer;font-size:12px;}
  .search-side{border:1px solid rgba(232,189,115,.24);border-radius:18px;padding:18px;background:rgba(0,0,0,.22);overflow:hidden;}
  .search-side h3{margin:0 0 12px;color:#ffd88d;font-size:18px;font-family:Georgia,"STKaiti","KaiTi",serif;letter-spacing:.12em;}
  .side-line{display:flex;justify-content:space-between;border-bottom:1px solid rgba(232,189,115,.12);padding:10px 0;color:#b4c0c4;font-size:13px;}
  .side-line b{color:#f3d396;font-weight:500}
  .oracle-card{margin-top:18px;border:1px solid rgba(232,189,115,.22);border-radius:16px;padding:15px;background:linear-gradient(180deg,rgba(232,189,115,.09),rgba(0,0,0,.08));color:#c9b384;line-height:1.75;font-size:13px;}

  /* 弹窗 */
  .modal-mask{position:absolute;inset:0;z-index:30;display:none;place-items:center;background:rgba(0,0,0,.56);backdrop-filter:blur(8px);}
  .modal-mask.active{display:grid;}
  .detail-modal{position:relative;width:min(940px,78%);height:min(640px,78%);border:1px solid rgba(232,189,115,.48);border-radius:28px;background:linear-gradient(135deg,rgba(5,17,25,.95),rgba(12,25,32,.91));box-shadow:0 28px 90px rgba(0,0,0,.62),0 0 0 1px rgba(255,237,188,.08) inset;overflow:hidden;}
  .detail-modal::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 28% 28%,rgba(232,189,115,.17),transparent 28%),radial-gradient(circle at 82% 15%,rgba(126,216,255,.12),transparent 23%);pointer-events:none;}
  .modal-grid{position:relative;height:100%;display:grid;grid-template-columns:44% 56%;}
  .modal-image{position:relative;margin:28px;border-radius:22px;overflow:hidden;border:1px solid rgba(232,189,115,.34);background:#03080d;}
  .modal-image img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.05)}
  .modal-image::after{content:"局部影像 / 纹理拓片";position:absolute;left:14px;bottom:14px;padding:6px 10px;border:1px solid rgba(232,189,115,.42);border-radius:999px;background:rgba(0,0,0,.55);font-size:12px;color:#ffe0a2;}
  .modal-info{position:relative;padding:32px 34px 28px 12px;display:flex;flex-direction:column;min-width:0;}
  .modal-eyebrow{display:inline-flex;align-self:flex-start;padding:4px 10px;border:1px solid rgba(232,189,115,.42);border-radius:999px;color:#ffd78b;font-size:12px;letter-spacing:.18em;}
  .modal-info h2{margin:16px 0 8px;font-size:34px;font-family:Georgia,"STKaiti","KaiTi",serif;color:#ffdc91;letter-spacing:.1em;}
  .modal-info p{margin:0;color:#b4c1c5;line-height:1.85;font-size:14px;}
  .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:18px 0;}
  .stat{border:1px solid rgba(232,189,115,.2);border-radius:14px;padding:10px 12px;background:rgba(0,0,0,.22);}
  .stat span{display:block;color:#8098a1;font-size:12px;margin-bottom:5px;}
  .stat b{color:#f6d49a;font-weight:500;}
  .modal-text{flex:1;overflow:auto;padding-right:8px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .close-x{position:absolute;right:18px;top:16px;z-index:3;width:36px;height:36px;border-radius:50%;border:1px solid rgba(232,189,115,.45);background:rgba(0,0,0,.28);color:#ffdaa0;font-size:22px;cursor:pointer;}
  .close-x:hover{background:rgba(232,189,115,.16)}
  .toast{position:absolute;left:50%;bottom:6%;z-index:70;transform:translateX(-50%) translateY(20px);opacity:0;padding:12px 18px;border:1px solid rgba(232,189,115,.45);background:rgba(4,13,19,.86);border-radius:999px;color:#ffe3ad;box-shadow:0 12px 32px rgba(0,0,0,.35);transition:.22s ease;}
  .toast.active{opacity:1;transform:translateX(-50%) translateY(0);}



  /* 3D 模型浮窗：把 GLB 模型接入到现有图片界面，不影响原热区 */
  .model-dock{position:absolute;right:1.25%;top:13.2%;z-index:14;width:min(335px,22.5%);height:41.5%;min-height:310px;border:1px solid rgba(232,189,115,.42);border-radius:22px;background:linear-gradient(180deg,rgba(5,18,27,.78),rgba(2,8,12,.88));box-shadow:0 18px 55px rgba(0,0,0,.46),0 0 36px rgba(232,189,115,.10) inset;backdrop-filter:blur(12px);overflow:hidden;transition:.28s ease;}
  .model-dock.collapsed{width:48px;height:160px;min-height:160px;border-radius:24px;overflow:hidden;}
  .model-dock.collapsed .model-body,.model-dock.collapsed .model-meta,.model-dock.collapsed .model-switch{display:none;}
  .model-head{height:45px;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid rgba(232,189,115,.22);background:rgba(0,0,0,.22);}
  .model-head strong{flex:1;color:#ffe0a4;font-size:14px;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .model-close{width:27px;height:27px;border:1px solid rgba(232,189,115,.38);background:rgba(232,189,115,.08);color:#ffdc91;border-radius:50%;cursor:pointer;}
  .model-close:hover{background:rgba(232,189,115,.2)}
  .model-pill{display:inline-grid;place-items:center;width:27px;height:27px;border-radius:50%;background:radial-gradient(circle,#ffe3a4,#9b6422);color:#160c04;font-weight:700;font-size:12px;box-shadow:0 0 18px rgba(232,189,115,.25)}
  .model-body{position:relative;height:calc(100% - 135px);min-height:170px;}
  .model-viewer{width:100%;height:100%;background:radial-gradient(circle at 50% 58%,rgba(232,189,115,.16),transparent 40%),linear-gradient(180deg,rgba(7,22,32,.45),rgba(0,0,0,.18));--poster-color:transparent;}
  .model-body::after{content:"拖拽旋转 · 滚轮缩放";position:absolute;left:10px;bottom:8px;padding:4px 9px;border:1px solid rgba(232,189,115,.30);border-radius:999px;background:rgba(0,0,0,.42);color:#d6c091;font-size:11px;pointer-events:none;}
  .model-fallback{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:20px;color:#cdb68a;font-size:12px;line-height:1.7;pointer-events:none;background:radial-gradient(circle,rgba(232,189,115,.08),transparent 58%);}
  model-viewer:not(:defined)+.model-fallback{display:grid;}
  model-viewer:defined+.model-fallback{display:none;}
  .model-meta{padding:9px 12px 8px;color:#aebec4;font-size:12px;line-height:1.55;border-top:1px solid rgba(232,189,115,.15);}
  .model-meta b{display:block;color:#ffd78b;font-weight:500;margin-bottom:2px;}
  .model-switch{display:flex;gap:5px;flex-wrap:wrap;padding:0 10px 10px;}
  .model-switch button{height:24px;padding:0 8px;border:1px solid rgba(232,189,115,.28);background:rgba(232,189,115,.06);color:#d8c298;border-radius:999px;font-size:11px;cursor:pointer;}
  .model-switch button.active,.model-switch button:hover{background:rgba(232,189,115,.20);color:#ffe4ad;}
  .model-hot-glow{position:absolute;right:24%;top:20%;width:20%;height:33%;border-radius:50%;background:radial-gradient(circle,rgba(255,220,140,.18),transparent 70%);filter:blur(1px);pointer-events:none;animation:modelPulse 3.2s ease-in-out infinite;z-index:4;}
  @keyframes modelPulse{0%,100%{opacity:.35;transform:scale(.92)}50%{opacity:.8;transform:scale(1.06)}}
  .detail-model-box{position:relative;height:162px;margin:14px 0;border:1px solid rgba(232,189,115,.22);border-radius:16px;overflow:hidden;background:rgba(0,0,0,.20);}
  .detail-model-box model-viewer{width:100%;height:100%;--poster-color:transparent;background:radial-gradient(circle at center,rgba(232,189,115,.13),transparent 58%);}
  .detail-model-tag{position:absolute;left:10px;top:9px;z-index:2;padding:4px 9px;border:1px solid rgba(232,189,115,.35);border-radius:999px;background:rgba(0,0,0,.42);color:#ffdc91;font-size:11px;pointer-events:none;}

  /* 加载态 */
  .loading-mask{position:absolute;inset:0;z-index:60;display:none;place-items:center;background:radial-gradient(circle at 50% 50%,rgba(232,189,115,.18),rgba(0,0,0,.68) 48%,rgba(0,0,0,.88));backdrop-filter:blur(7px);}
  .loading-mask.active{display:grid;}
  .loader{width:min(420px,44%);text-align:center;}
  .loader-ring{position:relative;width:168px;height:168px;margin:0 auto 22px;border-radius:50%;border:1px solid rgba(232,189,115,.25);}
  .loader-ring::before,.loader-ring::after{content:"";position:absolute;border-radius:50%;inset:10px;border:2px solid transparent;border-top-color:#ffd885;border-right-color:rgba(126,216,255,.55);animation:spin 1.3s linear infinite;}
  .loader-ring::after{inset:32px;border-top-color:rgba(255,255,255,.85);border-right-color:rgba(232,189,115,.2);animation-duration:2.1s;animation-direction:reverse;}
  .loader-seal{position:absolute;inset:54px;display:grid;place-items:center;border-radius:50%;background:rgba(232,189,115,.13);border:1px solid rgba(232,189,115,.38);color:#ffe1a3;font-family:Georgia,"STKaiti","KaiTi",serif;font-size:28px;box-shadow:0 0 22px rgba(232,189,115,.14) inset;}
  .loader h3{margin:0 0 10px;font-size:22px;font-family:Georgia,"STKaiti","KaiTi",serif;letter-spacing:.18em;color:#ffdc91;}
  .loader p{margin:0 0 18px;color:#aebec4;font-size:13px;letter-spacing:.1em;}
  .loadbar{height:5px;background:rgba(232,189,115,.15);border-radius:999px;overflow:hidden;}
  .loadbar span{display:block;height:100%;width:45%;background:linear-gradient(90deg,transparent,#ffda8a,#fff4c7);animation:scan 1.1s ease-in-out infinite;}

  @media (max-width:900px){
    .search-shell{inset:3%;padding:18px;}
    .search-body{grid-template-columns:1fr;}
    .search-side{display:none}
    .results{grid-template-columns:repeat(2,1fr)}
    .detail-modal{width:90%;height:82%;}
    .modal-grid{grid-template-columns:1fr;grid-template-rows:40% 60%;}
    .modal-image{margin:18px 18px 0;}
    .modal-info{padding:18px;}
    .quick-nav{display:none}
  }
</style>
</head>
<body>
<div id="app"><div id="stage" class="stage"></div></div>
<script>
const PAGES = [
  {
    "id": "home",
    "title": "山海浮卷 · 首页",
    "shortTitle": "首页",
    "source": "首页.png",
    "asset": "assets/p00.png",
    "group": "首页",
    "subtitle": "互动式山海经百科全书",
    "kind": "home",
    "index": 0
  },
  {
    "id": "p01",
    "title": "东山经1",
    "shortTitle": "东山经1",
    "source": "东山经1.png",

    <div class="side-line"><span>筛选类别</span><b>${activeFilter}</b></div>
    <div class="side-line"><span>结果数量</span><b>${list.length}</b></div>
    <div class="side-line"><span>已接入界面</span><b>${PAGES.length-1}</b></div>`;
}

function detailText(p){
  if(!p) return '该节点为临时信息层，可承载文字说明、高清贴图、属性表和跳转按钮。';
  if(p.group==='神木灵植') return '灵植节点记录其生长环境、形态纹理、神话寓意与互动采集状态。弹窗可用于展示局部贴图、药性标签、生态关系和“加入印记”的反馈。';
  if(p.group==='神话谱系') return '谱系节点强调人物、异兽、神祇和事件之间的关系链。弹窗适合呈现关系说明、源流层级、相关节点入口以及故事片段。';
  if(p.group==='我的印记') return '印记节点记录用户的探索轨迹、收藏条目和已解锁章节。弹窗可展示个人进度、徽章、今日记录和二次进入路径。';
  if(p.id==='home') return '首页作为总入口，承载四大模块、今日山海、典籍搜索和用户印记。弹窗用于说明当前节点、提示热区操作和引导继续探索。';
  return '该分卷节点对应山川、异兽、路径和文献卡片。弹窗补充“查看详情”交互：展示局部影像、条目属性、传说摘要和关联界面跳转。';
}
function openDetail(id, customTitle){
  const p = pageById[id] || currentPage || pageById.home;
  let modal = document.getElementById('modal');
  if(!modal){ stage().insertAdjacentHTML('beforeend', `<div id="modal" class="modal-mask"></div>`); modal=document.getElementById('modal'); }
  const title = customTitle || p.shortTitle || p.title;
  modal.innerHTML = `<div class="detail-modal">
    <button class="close-x" onclick="closeDetail()">×</button>
    <div class="modal-grid">
      <div class="modal-image"><img src="${p.asset}" alt="${title}"></div>
      <div class="modal-info">
        <span class="modal-eyebrow">详细弹窗 · DETAIL</span>
        <h2>${title}</h2>
        <p>${p.group} / ${p.subtitle}</p>
        <div class="stats-grid">
          <div class="stat"><span>档案类型</span><b>${p.kind==='plant'?'灵植':p.kind==='myth'?'谱系':p.kind==='mark'?'印记':p.kind==='home'?'首页':'山海节点'}</b></div>
          <div class="stat"><span>交互方式</span><b>点击热区 / 搜索进入</b></div>
          <div class="stat"><span>状态</span><b>已补全</b></div>
          <div class="stat"><span>关联节点</span><b>${PAGES.filter(x=>x.group===p.group).length} 个</b></div>
        </div>
        <div class="detail-model-box"><span class="detail-model-tag">关联 3D · ${modelLabel(currentModelKey(p))}</span><model-viewer src="${(MODEL_LIBRARY[currentModelKey(p)]||MODEL_LIBRARY.combined).src}" camera-controls auto-rotate rotation-per-second="18deg" exposure="1.06" shadow-intensity=".9" interaction-prompt="none"></model-viewer></div>
        <div class="modal-text"><p>${detailText(p)}</p><p style="margin-top:10px">当前版本已经给所有界面接入统一交互：顶部导航、左侧分卷、中心节点、右侧详情、底部卡片、搜索、加载过渡、详情弹窗与内容匹配的 3D 模型。</p></div>
        <div class="modal-actions"><button class="solid-btn" onclick="closeDetail(); gotoPage('${p.id}')">进入此界面</button><button class="ghost-btn" onclick="showToast('已加入我的印记')">加入印记</button><button class="ghost-btn" onclick="openSearch()">继续检索</button></div>
      </div>
    </div>
  </div>`;
  modal.classList.add('active');
}
function closeDetail(){ const m=document.getElementById('modal'); if(m) m.classList.remove('active'); }
function showToast(text){
  let t=document.getElementById('toast');
  if(!t){ stage().insertAdjacentHTML('beforeend', `<div id="toast" class="toast"></div>`); t=document.getElementById('toast'); }
  t.textContent = text; t.classList.add('active'); setTimeout(()=>t.classList.remove('active'), 1400);
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeDetail(); if(document.querySelector('.search-page')) renderPage(lastPageBeforeSearch || 'home'); }
  if(e.key.toLowerCase()==='s') openSearch();
  if(e.key.toLowerCase()==='h') toggleHotspots();
  if(e.key.toLowerCase()==='m') toggleModelDock();
  if(e.key==='ArrowRight') gotoNeighbor(1);
  if(e.key==='ArrowLeft') gotoNeighbor(-1);
});

(function init(){
  const hash = location.hash.replace('#','');
  if(hash && pageById[hash]) renderPage(hash); else renderSplash();
})();
</script>
</body>
</html>
