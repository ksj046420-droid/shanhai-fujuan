const groupLabel={首页:'山海浮卷首页',东山经:'东山经·异兽山脉',南山经:'南山经·灵鸟与荒泽',西山经:'西山经·西陆神兽',北山经:'北山经·寒岭异象',中山经:'中山经·中土山系',海内经:'海内经·人间神域',海外经:'海外经·远洋异邦',大荒经:'大荒经·荒古神话',神木灵植:'神木灵植·生命树谱',神话图谱:'神话图谱·神系关系',我的印记:'我的印记·探索档案'};
let state={idx:0,debug:false,sound:false,visited:new Set(JSON.parse(localStorage.getItem('shanhaiVisited')||'[]'))};
const byGroup=GROUP_ORDER.reduce((a,g)=>(a[g]=PAGES.filter(p=>p.group===g),a),{});
const stage=document.getElementById('stage'), img=document.getElementById('mainImg'), hsLayer=document.getElementById('hotspots'), tip=document.getElementById('tip'), drawer=document.getElementById('drawer'), modal=document.getElementById('modal'), dim=document.getElementById('dim'), toastEl=document.getElementById('toast');
function pct(n){return n+'%'} function goFile(file){const i=PAGES.findIndex(p=>p.file===file); if(i>=0) render(i)} function firstOf(g){return (byGroup[g]&&byGroup[g][0]||PAGES[0]).file} function current(){return PAGES[state.idx]}
function render(i){state.idx=(i+PAGES.length)%PAGES.length; const p=current(); img.src='assets/images/'+encodeURIComponent(p.file); document.getElementById('crumb').textContent=`${p.title}｜${groupLabel[p.group]||p.group}`; state.visited.add(p.file); localStorage.setItem('shanhaiVisited',JSON.stringify([...state.visited])); document.getElementById('prog').style.width=(state.visited.size/PAGES.length*100)+'%'; buildHotspots(p); closeAll(); toast('已进入 '+p.title);}
function toast(t){toastEl.textContent=t;toastEl.style.opacity=1;clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.style.opacity=0,1100)}
function addHS(list,o){list.push(Object.assign({type:'modal',title:'交互热区',desc:'点击触发内容'},o))}
function buildHotspots(p){hsLayer.innerHTML=''; const list=[];
 addHS(list,{x:.8,y:1.2,w:10.5,h:6.2,title:'返回主卷首页',desc:'点击回到首页总览，重置当前镜头。',action:()=>goFile('首页.png')});

 addHS(list,{x:90.1,y:1.2,w:3.8,h:5.4,title:'界面设置',desc:'打开热区显示、粒子氛围、全屏等软件属性。',action:()=>showDrawer('软件属性',softwareHTML())});

function createHS(o,idx){const d=document.createElement('button'); d.className='hotspot'; if(state.debug)d.classList.add('vis'); d.style.left=pct(o.x); d.style.top=pct(o.y); d.style.width=pct(o.w); d.style.height=pct(o.h); d.setAttribute('aria-label',o.title); d.onmouseenter=e=>showTip(o,e); d.onmousemove=e=>moveTip(e); d.onmouseleave=()=>tip.style.opacity=0; d.onclick=()=>{(o.action||(()=>showModal(o.title,modalHTML(o))))()}; hsLayer.appendChild(d); if(o.pulse){const p=document.createElement('img');p.className='pulse-icon';p.src='assets/images/图标 ('+(o.icon||1)+').png';p.style.left=pct(o.x+o.w/2-2.75);p.style.top=pct(o.y+o.h/2-2.75);p.alt=o.title;hsLayer.appendChild(p)}}
function homeHS(list,p){

document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')render(state.idx+1); if(e.key==='ArrowLeft')render(state.idx-1); if(e.key.toLowerCase()==='h')document.getElementById('debugBtn').click(); if(e.key.toLowerCase()==='f')toggleFull(); if(e.key==='Escape')closeAll()});
// Particle background bound to canvas
const c=document.getElementById('fx'), ctx=c.getContext('2d'); let particles=[]; function resize(){c.width=stage.clientWidth;c.height=stage.clientHeight;particles=Array.from({length:70},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.8+.4,v:Math.random()*.35+.05,a:Math.random()*Math.PI*2}))} window.addEventListener('resize',resize); resize(); function anim(){ctx.clearRect(0,0,c.width,c.height); for(const p of particles){p.y-=p.v*(state.sound?2.4:1); p.x+=Math.sin(p.a+=.01)*.18; if(p.y<0)p.y=c.height; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,220,150,${state.sound?.75:.38})`; ctx.fill()} requestAnimationFrame(anim)} anim();
function drawNodeLines(p){document.querySelectorAll('.nodeLine').forEach(e=>e.remove()); if(!['神木灵植','神话图谱','我的印记'].includes(p.group))return; const coords=p.group==='神话图谱'?[[50,38],[50,20],[33,30],[67,30],[31,52],[69,52],[50,61],[41,72],[59,72]]:p.group==='神木灵植'?[[49,22],[37,38],[60,39],[49,51],[31,58],[67,59],[49,68]]:[[50,31],[39,42],[61,42],[50,55],[34,63],[66,63]]; const center=coords[0]; coords.slice(1).forEach(pt=>{const l=document.createElement('i'); l.className='nodeLine'; const dx=pt[0]-center[0],dy=pt[1]-center[1],len=Math.sqrt(dx*dx+dy*dy); l.style.left=pct(center[0]); l.style.top=pct(center[1]); l.style.width=pct(len); l.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`; hsLayer.appendChild(l)})}
render(0);
